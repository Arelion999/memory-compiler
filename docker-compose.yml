version: "3.8"

services:
  memory-compiler:
    build: .
    container_name: memory-compiler-mcp
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - ./knowledge:/knowledge
      - ./server.py:/app/server.py:ro
      - ./memory_compiler:/app/memory_compiler:ro
      - ./VERSION:/app/VERSION:ro
      - ${GIT_REPOS_PATH:-/dev/null}:/repos:ro
      - ${OBSIDIAN_VAULT_PATH:-/dev/null}:/vault:ro
      - hf_cache:/root/.cache/huggingface
    environment:
      - KNOWLEDGE_DIR=/knowledge
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8765
      - MC_API_KEY=${MC_API_KEY:-}
      - MC_ENCRYPT_KEY=${MC_ENCRYPT_KEY:-}
      - GIT_CAPTURE_ALLOWED_ROOTS=${GIT_CAPTURE_ALLOWED_ROOTS:-/repos}
      - TZ=Asia/Vladivostok
      # CPU-потоки для torch/BLAS (J4125 = 4 ядра) — ~2x быстрее reindex.
      # Применяется только при recreate (docker-compose up -d --force-recreate).
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-4}
      # ML model configuration (v1.7.0+) — passthrough from .env, with defaults
      - EMBED_MODEL=${EMBED_MODEL:-paraphrase-multilingual-MiniLM-L12-v2}
      - RERANKER_MODEL=${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      - LATE_CHUNKING=${LATE_CHUNKING:-false}
      - SPLADE_ENABLED=${SPLADE_ENABLED:-false}
      - EMBED_BATCH_SIZE=${EMBED_BATCH_SIZE:-8}
      - EMBED_MAX_SEQ_LENGTH=${EMBED_MAX_SEQ_LENGTH:-2048}
      # HF Hub: после первой загрузки модели работать только из кеша,
      # не делать сетевых вызовов (telemetry/version-check) — иначе на
      # некоторых сетях падаем Errno 99 при обращении к huggingface.co
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-1}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-1}
      - HF_HUB_DISABLE_TELEMETRY=1
      # - PROJECTS=project-a,project-b,infra,general

volumes:
  hf_cache:
