version: "3.8"

services:
  memory-compiler:
    build: .
    container_name: memory-compiler-mcp
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - ./knowledge:/knowledge
      - ./server.py:/app/server.py:ro
      - ./memory_compiler:/app/memory_compiler:ro
      - ./VERSION:/app/VERSION:ro
      - ${GIT_REPOS_PATH:-/dev/null}:/repos:ro
      - ${OBSIDIAN_VAULT_PATH:-/dev/null}:/vault:ro
      - hf_cache:/root/.cache/huggingface
    environment:
      - KNOWLEDGE_DIR=/knowledge
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8765
      - MC_API_KEY=${MC_API_KEY:-}
      - MC_ENCRYPT_KEY=${MC_ENCRYPT_KEY:-}
      - GIT_CAPTURE_ALLOWED_ROOTS=${GIT_CAPTURE_ALLOWED_ROOTS:-/repos}
      - TZ=Asia/Vladivostok
      # ML model configuration (v1.7.0+) — passthrough from .env, with defaults
      - EMBED_MODEL=${EMBED_MODEL:-paraphrase-multilingual-MiniLM-L12-v2}
      - RERANKER_MODEL=${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      - LATE_CHUNKING=${LATE_CHUNKING:-false}
      - SPLADE_ENABLED=${SPLADE_ENABLED:-false}
      # - PROJECTS=project-a,project-b,infra,general

volumes:
  hf_cache:
