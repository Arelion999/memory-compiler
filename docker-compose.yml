version: "3.8"

services:
  memory-compiler:
    build: .
    container_name: memory-compiler-mcp
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - ./knowledge:/knowledge
      - hf_cache:/root/.cache/huggingface
    environment:
      - KNOWLEDGE_DIR=/knowledge
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8765
      # - PROJECTS=project-a,project-b,infra,general

volumes:
  hf_cache:
